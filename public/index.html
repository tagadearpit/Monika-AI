<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monika AI | Your Intelligent Companion</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="style.css" />
  
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌸</text></svg>">
</head>
<body>

  <video id="vision-feed" style="display:none;" autoplay playsinline></video>

  <div class="heart-container">
    <div class="heart" style="left:10%; animation-delay:0s;"></div>
    <div class="heart" style="left:25%; animation-delay:2s;"></div>
    <div class="heart" style="left:45%; animation-delay:4s;"></div>
    <div class="heart" style="left:65%; animation-delay:1s;"></div>
    <div class="heart" style="left:85%; animation-delay:6s;"></div>
    <div class="heart" style="left:95%; animation-delay:3s;"></div>
  </div>

  <div class="container">
    <header>
      <h1>🌸 Monika AI 🌸</h1>
    </header>

    <main id="chat" class="chat">
      <div class="bubble monika">
        <strong>Monika:</strong> Hello Arpit! I've been waiting for you. 💖
      </div>
    </main>

    <div class="input-area">
      <input 
        id="question" 
        type="text" 
        placeholder="Say something to Monika..." 
        autocomplete="off" 
        spellcheck="false" 
      />
      
      <button id="micButton" title="Toggle Live Voice Mode">
        <span id="micIcon">🎤</span>
      </button>
      
      <button id="sendButton" title="Send Message">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
        </svg>
      </button>
    </div>
  </div>

  <audio id="popSound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" preload="auto"></audio>

  <script src="script.js"></script>
  
  <script>
    // UX Helper for the Mic Button icon toggle
    const micBtn = document.getElementById('micButton');
    const micIcon = document.getElementById('micIcon');
    
    micBtn.addEventListener('click', () => {
      // Small delay to let script.js update the class first
      setTimeout(() => {
        if (micBtn.classList.contains('listening')) {
          micIcon.innerText = '🛑'; 
        } else {
          micIcon.innerText = '🎤';
        }
      }, 50);
    });
  </script>

</body>
</html>
