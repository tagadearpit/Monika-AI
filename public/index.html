<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monika AI</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Nunito:wght@300;400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
</head>
<body>
    <div id="login-overlay" class="login-overlay">
        <div class="login-box">
            <h2 class="title-gradient" style="font-family: 'Dancing Script', cursive; font-size: 3.5rem; margin-bottom: 10px;">Monika AI</h2>
            <p style="color: rgba(255,255,255,0.7); margin-bottom: 20px;">Choose how you want to connect.</p>
            
            <div id="googleButton" style="display: flex; justify-content: center; margin-bottom: 20px;"></div>
            
            <div id="phone-input-section">
                <div style="color: rgba(255,255,255,0.4); font-size: 0.85rem; margin-bottom: 15px; letter-spacing: 2px;">— OR LOGIN WITH —</div>
                
                <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                    <button id="showEmailBtn" class="auth-toggle-btn active">Email</button>
                    <button id="showPhoneBtn" class="auth-toggle-btn">Phone</button>
                </div>
                
                <div id="emailInputGroup">
                    <input type="email" id="emailInput" placeholder="Enter your email address" style="text-align: center;">
                </div>
                <div id="phoneInputGroup" style="display: none;">
                    <input type="tel" id="phoneInput" placeholder="Phone number (+123...)" style="text-align: center;">
                </div>

                <button id="sendCodeBtn" class="action-btn">Send Login Code</button>
            </div>

            <div id="otp-input-section" style="display: none;">
                <p style="color: #ff6b9d; margin-bottom: 10px; font-size: 0.9rem;">Check your Inbox or SMS! 🌸</p>
                <input type="number" id="verificationCode" placeholder="Enter 6-digit code" style="text-align: center; letter-spacing: 5px; font-size: 1.2rem;">
                <button id="verifyCodeBtn" class="action-btn" style="background: linear-gradient(45deg, #4ade80, #3b82f6); border: none;">Verify & Enter</button>
            </div>
            <div id="recaptcha-container" style="margin-top: 15px;"></div>
        </div>
    </div>

    <div class="container" id="main-wrapper">
        
        <header class="app-header">
            <div class="logo-area">
                <div class="monika-avatar">
                    <div class="avatar-img" style="width: 45px; height: 45px; font-size: 1.2rem; border-width: 2px;">🌸</div>
                </div>
                <h1 class="title-gradient" style="font-size: 2.2rem; margin: 0;">Monika AI</h1>
            </div>
            
            <div class="action-area">
                <button id="logoutBtn" class="quick-btn" style="border-color: rgba(255, 77, 77, 0.3); color: #ff4d4d; padding: 6px 15px;">Logout</button>
                <button id="pipButton" class="quick-btn" style="padding: 6px 12px;" title="Pop-Out Window"><i class="fas fa-external-link-alt"></i></button>
            </div>
        </header>

        <div id="vision-container" class="video-box" style="display: none;">
            <video id="vision-feed" autoplay playsinline muted></video>
            <canvas id="capture-canvas" style="display:none;"></canvas>
            <div id="vision-label">🔴 LIVE REALITY FEED</div>
        </div>

        <main class="chat-container" id="chat-container">
            <div class="chat-messages" id="chatMessages">
                </div>

            <div class="input-container">
                <div class="input-wrapper" style="margin-bottom: 0;">
                    <input type="text" id="messageInput" placeholder="Type to Monika... 💕" autocomplete="off">
                    <button id="camButton" class="tool-btn" title="Vision Mode"><i class="fas fa-camera"></i></button>
                    <button id="micButton" class="tool-btn" title="Voice Chat"><i class="fas fa-microphone"></i></button>
                    <button id="sendBtn" class="send-btn">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <template id="typing-template">
        <div class="message monika typing-indicator">
            <div class="message-content" style="background: rgba(255, 255, 255, 0.08); border-bottom-left-radius: 5px;">
                <div class="typing-dots">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </div>
    </template>

    <script src="script.js"></script>
</body>
</html>
