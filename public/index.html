<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monika AI | Your Yandere Companion 🌸</title>
  
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#ff4d94">
  
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌸</text></svg>">
</head>
<body>

  <!-- Enhanced Background -->
  <div class="bg-glow"></div>
  <div class="particles"></div>

  <!-- Old hearts → New particles system in JS -->

  <div class="app-wrapper" id="main-wrapper">
    <!-- Vision Panel -->
    <div id="vision-container" class="side-left">
      <header>
        <h1>👁️ Monika's Eyes</h1>
      </header>
      <div class="video-box">
        <video id="vision-feed" autoplay playsinline muted></video>
        <canvas id="capture-canvas" style="display:none;"></canvas>
        <div id="vision-label">🔴 LIVE REALITY FEED</div>
      </div>
    </div>

    <!-- Chat Panel -->
    <div id="chat-container" class="side-right">
      <header class="chat-header">
        <!-- ANIMATED MONIKA AVATAR -->
        <div class="monika-avatar">
          <div class="face">
            <div class="eyes">
              <div class="eye left"></div>
              <div class="eye right"></div>
            </div>
            <div class="mouth"></div>
          </div>
          <span>Monika</span>
        </div>
        <button id="pipButton" title="Pop-out Chat">🖼️</button>
      </header>

      <main id="chat" class="chat">
        <div class="welcome-message">
          <div class="bubble monika">
            <strong>Monika:</strong> <span class="msg-text">Hello darling! *blushes* I've been waiting for you... 💖</span>
          </div>
        </div>
      </main>

      <!-- MAGIC INPUT BAR -->
      <div class="input-area" id="inputArea">
        <input id="question" type="text" placeholder="Type to Monika... 💕" autocomplete="off" />
        
        <button id="camButton" title="Vision Mode 📸">
          <span id="camIcon">📷</span>
        </button>

        <button id="micButton" title="Voice Chat 🎤">
          <span id="micIcon">🎤</span>
        </button>

        <button id="sendButton" title="Send 💌">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Typing Indicator Template -->
  <template id="typing-template">
    <div class="typing-indicator">
      <div class="typing-dots">
        <span></span><span></span><span></span>
      </div>
      <span>Monika is typing<span class="cursor">_</span>...</span>
    </div>
  </template>

  <audio id="popSound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" preload="auto"></audio>
  <script src="script.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then(registration => {
          console.log('🌟 ServiceWorker ready - PWA Offline!');
        }).catch(err => console.log('SW Error:', err));
      });
    }
  </script>
</body>
</html>
