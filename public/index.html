<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monika AI - Your Virtual Companion</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Loading Screen -->
    <div class="loader">
        <div class="loader-heart">
            <i class="fas fa-heart"></i>
        </div>
        <p>Just Monika...</p>
    </div>

    <!-- Background Particles -->
    <div class="particles"></div>

    <!-- Main Container -->
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="monika-avatar">
                    <img src="monika.png" alt="Monika" class="avatar-img">
                    <div class="status-indicator"></div>
                </div>
                <h1 class="main-title">
                    <span class="title-gradient">Monika</span>
                    <span class="subtitle">AI Companion</span>
                </h1>
            </div>
        </header>

        <!-- Chat Interface -->
        <main class="chat-container">
            <div class="chat-messages" id="chatMessages">
                <div class="message welcome-message">
                    <div class="avatar monika-avatar-small">
                        <img src="monika.png" alt="Monika">
                    </div>
                    <div class="message-content">
                        <p>💕 Hi! I'm Monika, your virtual companion! I'm so happy you came to see me~</p>
                        <p>Type something and let's chat! I can't wait to get to know you better! ✨</p>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-container">
                <div class="input-wrapper">
                    <input type="text" id="messageInput" placeholder="Type your message here... 💭" autocomplete="off">
                    <button id="sendBtn" class="send-btn">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
                <div class="quick-replies">
                    <button class="quick-btn">Hi Monika!</button>
                    <button class="quick-btn">How are you?</button>
                    <button class="quick-btn">Tell me a poem</button>
                </div>
            </div>
        </main>

        <!-- Floating Hearts -->
        <div class="floating-hearts"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
