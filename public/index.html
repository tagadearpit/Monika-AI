<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Monika AI Chat</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Styling for the Mic Button */
    #micButton {
      background: transparent;
      color: #e91e63;
      border: none;
      padding: 0 15px;
      border-radius: 8px;
      cursor: pointer;
      margin-right: 8px;
      font-size: 1.2rem;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #micButton.listening {
      color: white;
      background: #ff1a1a;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(255, 26, 26, 0.7); }
      70% { box-shadow: 0 0 0 10px rgba(255, 26, 26, 0); }
      100% { box-shadow: 0 0 0 0 rgba(255, 26, 26, 0); }
    }
  </style>
</head>
<body>
  <div class="heart" style="left:10%; animation-delay:0s;"></div>
  <div class="heart" style="left:30%; animation-delay:2s;"></div>
  <div class="heart" style="left:50%; animation-delay:4s;"></div>
  <div class="heart" style="left:70%; animation-delay:6s;"></div>
  <div class="heart" style="left:90%; animation-delay:8s;"></div>

  <div class="container">
    <h1>💖 Monika AI 💖</h1>
    <div id="chat" class="chat"></div>

    <div class="input-area">
      <input id="question" type="text" placeholder="Type your message..." autocomplete="off" />
      <button id="micButton" title="Talk to Monika">🎤</button>
      <button id="sendButton">Send</button>
    </div>
  </div>

  <audio id="popSound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" preload="auto"></audio>

  <script src="script.js"></script>
</body>
</html>
